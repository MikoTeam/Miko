<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikoStrem - Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Layar Login (Muncul Pertama) -->
<div id="loginScreen" style="text-align:center; padding: 100px 20px;">
    <h1 style="color:#f39c12; margin-bottom:10px;">WebStrime</h1>
    <p style="margin-bottom: 30px; color:#ccc;">Platform streaming premium by DenPutra. Login untuk akses fitur lengkap.</p>
    <button onclick="loginGoogle()" style="padding:15px 30px; background:#f39c12; border:none; border-radius:50px; font-weight:bold; cursor:pointer; font-size:16px;">Login dengan Google</button>
</div>

<!-- Semua Halaman Utama (Awalnya disembunyikan) -->
<div id="mainApp" style="display: none;">
    <div id="home" class="page" style="display: block;">
        <div class="header-premium">
            <div class="brand-container">
                <div class="brand-icon">M</div> 
                <h1 class="brand-title">MikoStrem</h1>
            </div>
            <input type="text" id="searchInput" placeholder="Cari anime..." oninput="cariAnime()">
        </div>
        <div class="xp-card"> 
            <h3>👑 TOP XP USERS</h3>
        </div>
        <div class="section-title">Anime Populer</div>
        <div class="anime-grid"></div>
    </div>

    <div id="jadwal" class="page" style="display: none;">
        <h2 class="page-title" style="padding: 0 20px;">Jadwal Tayang</h2>
        <div class="day-scroll">
            <button class="day-btn active" onclick="pilihHari(this, 'Senin')">Senin</button>
            <button class="day-btn" onclick="pilihHari(this, 'Selasa')">Selasa</button>
            <button class="day-btn" onclick="pilihHari(this, 'Rabu')">Rabu</button>
            <button class="day-btn" onclick="pilihHari(this, 'Kamis')">Kamis</button>
            <button class="day-btn" onclick="pilihHari(this, 'Jumat')">Jumat</button>
            <button class="day-btn" onclick="pilihHari(this, 'Sabtu')">Sabtu</button>
            <button class="day-btn" onclick="pilihHari(this, 'Minggu')">Minggu</button>
        </div>
        <div id="jadwal-content" style="margin-top:20px;"></div>
    </div>

    <div id="favorit" class="page" style="display: none;">
        <h2 class="page-title" style="padding: 0 20px;">Favorit Saya</h2>
        <div id="favorit-grid" class="anime-grid"></div>
    </div>

    <div id="profil" class="page" style="display: none;">
        <h2 class="page-title" style="padding: 0 20px;">Profil Saya</h2>
        <div class="profile-card-center" id="profileContent"></div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn active" onclick="pindah('home')">Home</button>
        <button class="nav-btn" onclick="pindah('jadwal')">Jadwal</button>
        <button class="nav-btn" onclick="pindah('favorit')">Favorit</button>
        <button class="nav-btn" onclick="pindah('profil')">Profil</button>
    </nav>
</div>

<div id="videoModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; padding:20px; overflow-y:auto;">
    <button class="close-btn" onclick="tutupVideo()" style="cursor:pointer; background:none; border:none; color:white; font-size:24px;">✕</button>
    <video id="videoPlayer" controls autoplay playsinline style="width:100%; margin-top:20px; border-radius:10px;"></video>
    <div id="videoInfo" style="margin-top:20px; color:white; padding-bottom:50px;"></div>
</div>
 
<script type="module" src="main.js"></script>
</body>
</html>
