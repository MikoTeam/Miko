<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikoStrem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page" id="home">
        <header><div class="logo-box">M</div><h1>Miko<span>Strem</span></h1></header>
        <div class="leaderboard-card"><h3 class="leaderboard-title">LEADERBOARD XP</h3><div id="leaderboard-list"></div></div>
        <div class="search-container"><input type="text" id="searchInput" placeholder="Cari Anime..."></div>
        <h3 class="section-title">ANIME POPULER</h3><div class="anime-grid"></div>
    </div>

    <div class="page" id="jadwal" style="display:none;">
        <h2 class="calendar-header-title">Jadwal Tayang</h2>
        <div class="day-tabs-container" id="dayTabsContainer"></div>
        <div id="jadwal-anime-list"></div>
    </div>

    <div class="page" id="page-favorit" style="display:none;">
        <h3 class="section-title">Anime Favorit</h3>
        <div id="favorit-list" class="anime-grid"></div>
    </div>

    <div class="page" id="profil" style="display:none;">
        <div class="profile-header-container">
            <img src="https://cdn.phototourl.com/free/2026-06-22-e9ba5001-cb39-469f-a0f1-5cc220c2024e.png" class="icon-notif" alt="Notifikasi">
            <div class="profile-right-icons">
                <img src="https://cdn.phototourl.com/free/2026-06-22-63514f64-8886-40d4-a097-07c7c2a8002e.png" class="icon-setting" alt="Pengaturan">
                <img src="https://cdn.phototourl.com/free/2026-06-22-a8d87822-c571-4b63-9ead-489db5667b15.png" class="icon-chat" alt="Chat">
            </div>
        </div>
        <h3 class="section-title">Profil Pengguna</h3>
        <div class="profile-card-center" style="background:#11141a; padding:20px; border-radius:12px; border:1px solid #1f2833; text-align:center; margin-top:15px;">
            <div class="avatar-large" id="avatar" style="width:70px; height:70px; background:#f39c12; color:#000; font-size:28px; font-weight:900; display:flex; align-items:center; justify-content:center; border-radius:50%; margin:0 auto 15px auto;">M</div>
            
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                <h3 id="userName" style="color:#fff; margin:0;">Memuat...</h3>
                <img id="verifIcon" src="" style="display:none; width:18px; height:18px; vertical-align:middle;">
            </div>
            
            <p id="userRole" style="color:#f39c12; font-size:12px; font-weight:bold; margin-top:5px;">User</p>
            
            <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0;">
                <div style="background:#1f2833; padding:8px; border-radius:8px;"><div style="font-size:10px; color:#888;">Exp</div><div id="statExp" style="font-size:12px;">0</div></div>
                <div style="background:#1f2833; padding:8px; border-radius:8px;"><div style="font-size:10px; color:#888;">Komen</div><div id="statKomen" style="font-size:12px;">0</div></div>
                <div style="background:#1f2833; padding:8px; border-radius:8px;"><div style="font-size:10px; color:#888;">Hari</div><div id="statHari" style="font-size:12px;">0</div></div>
                <div style="background:#1f2833; padding:8px; border-radius:8px;"><div style="font-size:10px; color:#888;">Teman</div><div id="statTeman" style="font-size:12px;">0</div></div>
            </div>

            <div id="xpContainer" style="margin: 15px 0;">
                <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px;">
                    <span id="xpDisplay">XP Anda: Memuat...</span>
                </div>
                <div style="background: #1f2833; height: 8px; border-radius: 4px;">
                    <div id="xpBar" style="background: #f39c12; height: 100%; width: 0%; border-radius: 4px;"></div>
                </div>
            </div>

            <div id="infoDetail" style="background: #1f2833; padding: 15px; border-radius: 8px; text-align: left; font-size: 13px; color: #ccc; line-height: 1.8;">
                <div>Username: <span id="info-username">-</span></div>
                <div>Email: <span id="info-email">-</span></div>
                <div>Metode: <span id="info-login">-</span></div>
                <div style="color: #f39c12; font-weight: bold;">Kode Unik: <span id="info-kode">#0000</span></div>
            </div>

            <button onclick="window.handleLogout()" style="margin-top:15px; background:transparent; border:1px solid #e74c3c; color:#e74c3c; padding:5px 20px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="tutupVideo()">&times;</span>
            <div id="videoInfo"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="navigasiKe('home', this)">
            <img src="https://cdn.phototourl.com/free/2026-06-22-807000d1-0ae1-427c-bd51-d50015842c0f.png" alt="Home">
            <span>Home</span>
        </button>
        <button class="nav-btn" onclick="navigasiKe('jadwal', this)">
            <img src="https://cdn.phototourl.com/free/2026-06-22-03b1b6e0-7195-494a-98fe-1e7e99394082.png" alt="Jadwal">
            <span>Jadwal</span>
        </button>
        <button class="nav-btn" onclick="navigasiKe('page-favorit', this)">
            <img src="https://cdn.phototourl.com/free/2026-06-22-f75bfb57-fc0f-4cd5-9aa1-fe612555a4e9.png" alt="Favorite">
            <span>Favorite</span>
        </button>
        <button class="nav-btn" onclick="navigasiKe('profil', this)">
            <img src="https://cdn.phototourl.com/free/2026-06-22-46de19e4-973b-48dd-9372-5c6c0dafa2da.png" alt="Profile">
            <span>Profile</span>
        </button>
    </div>

    <script type="module" src="main.js"></script>
</body>
    </html>
